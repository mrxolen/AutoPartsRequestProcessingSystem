services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autoparts_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/autoparts_db
      SPRING_DATASOURCE_USERNAME: autoparts_user
      SPRING_DATASOURCE_PASSWORD: "12345"
    ports:
      - "8080:8080"

  postgres:
    image: postgres:17-alpine
    container_name: autoparts_postgres
    environment:
      POSTGRES_DB: autoparts_db
      POSTGRES_USER: autoparts_user
      POSTGRES_PASSWORD: "12345"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoparts_user -d autoparts_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
